name: Deploy wizard to GitHub Pages

# Backup host for the Trellis wizard (primary: https://trellis.sidre.site).
# Builds apps/web/dist and publishes it to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'standard/**'
      - 'packages/core/src/compose.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (root, for the yaml dep used by the build script)
        run: npm install --no-audit --no-fund
      - name: Build wizard
        run: node apps/web/build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
