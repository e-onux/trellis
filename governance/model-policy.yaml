# Model policy - which models may author code in this repository.
# Validated by the check-model-provenance capability; enforced by `trellis model-check`.
# Provenance is stored out-of-band in .trellis/provenance.jsonl so commit messages stay clean.
# See tech/decisions/ADR-0005-model-provenance-gate.md.
version: "0.1"

# Allow-list of model ids permitted to author commits. A commit whose recorded model is not
# in this list (and is present) is a violation. Keep this to the capable, intended models;
# the whole point is to stop a degraded fallback from silently shipping code.
allowed_models:
  # Replace with the exact model ids you trust to author code here (e.g. "vendor-model-version").
  - your-primary-model
  - your-secondary-model

# Optional explicit block-list (redundant with the allow-list, but documents intent and
# catches a model that is otherwise on a shared allow-list). Example:
# disallow:
#   - a-known-weak-fallback-model
disallow: []

# Fail-closed: a commit in the enforcement window with no recorded provenance is a violation.
# Set to false to only flag commits whose recorded model is disallowed (advisory provenance).
require_provenance: true

# Enforcement window. Commits at or before this point are exempt (you do not retroactively
# stamp history). Accepts a date (YYYY-MM-DD, matched with `git --since`) or a git ref/range base.
enforce_since: "2026-06-18"

# block = a violation fails `trellis model-check` (non-zero exit) so CI/pre-push can block the
# merge before bad-model code lands. warn = report only, never fail. Reverting code that already
# landed is intentionally NOT automatic - blocking before merge is safer; see ADR-0005.
enforcement: block
